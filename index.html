<!DOCTYPE html>

  <style>

      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", "Noto Sans CJK SC", sans-serif;
    }

    .model-controls-panel .icon-svg {
      width: 18px;
      height: 18px;
      display: block;
      color: currentColor;
    }

    .model-controls-panel .icon-svg path,
    .model-controls-panel .icon-svg polyline,
    .model-controls-panel .icon-svg line,
    .model-controls-panel .icon-svg rect,
    .model-controls-panel .mode-icon path,
    .model-controls-panel .mode-icon rect,
    .model-controls-panel .mode-icon circle {
      fill: none;
      stroke: currentColor;
      stroke-width: 1.85;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .model-controls-panel .mode-icon {
      width: 16px;
      height: 16px;
      display: block;
      color: currentColor;
    }

    .model-controls-panel .mode-icon .dot {
      fill: currentColor;
      stroke: none;
    }

    .model-controls-panel .mode-label {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.45px;
      line-height: 1;

  <script>
    (function initWebSocketLogger() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${window.location.host}`;
      let ws = null;

      function connectWS() {
        try {
          ws = new WebSocket(wsUrl);
          ws.onopen = () => console.log('[WS] log bridge connected');
          ws.onclose = () => {
            console.warn('[WS] log bridge disconnected, retrying in 5s');
            setTimeout(connectWS, 5000);
          };
          ws.onerror = () => console.error('[WS] log bridge error');
        } catch (error) {
          console.error('[WS] log bridge init failed', error);
        }
      }

      const originalLog = console.log;
      const originalWarn = console.warn;
      const originalError = console.error;
      const originalInfo = console.info;

      function sendLog(type, args) {
        const message = Array.from(args).map(arg => {
          if (typeof arg === 'object') {
            try {
              return JSON.stringify(arg);
            } catch (_) {
              return String(arg);
            }
          }
          return String(arg);
        }).join(' ');

        if (ws && ws.readyState === WebSocket.OPEN) {
          try {
            const timestamp = new Date().toLocaleTimeString('zh-CN', {
              hour12: false,
              hour: '2-digit',
              minute: '2-digit',
              second: '2-digit'
            });
            ws.send(JSON.stringify({ type, message, timestamp }));
          } catch (_) {
            // Ignore transient logging transport errors.
          }
        }
      }

      console.log = function () {
        originalLog.apply(console, arguments);
        sendLog('LOG', arguments);
      };

      console.warn = function () {
        originalWarn.apply(console, arguments);
        sendLog('WARN', arguments);
      };

      console.error = function () {
        originalError.apply(console, arguments);
        sendLog('ERROR', arguments);
      };

      console.info = function () {
        originalInfo.apply(console, arguments);
        sendLog('INFO', arguments);
      };

      connectWS();
      console.log('[APP] debug logger ready');
    })();
  </script>

  <script type="module" src="/js/app.js"></script>

  <div class="loading-overlay" style="display: none;">
